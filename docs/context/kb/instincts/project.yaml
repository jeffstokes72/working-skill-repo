  - id: use-steering-memory-before-instinct-promotion
    scope: project
    trigger: "when repeated agent work receives feedback that should affect future runs but has not yet proven itself as a project-wide convention"
    behavior: "record the feedback in goal steering memory or docs/context/operations/steering before promoting it to scored instincts or learned skills"
