name: Cross-platform proof

on:
  push:
  pull_request:

jobs:
  kbcheck:
    name: kbcheck (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install KB globals for sync proof
        run: node ./bin/kb-install.mjs --target all --profile full --yes

      - name: Install ATV sync target fixture
        run: node ./bin/kb-install.mjs --target repo --profile full --repo ../all-the-vibes --yes

      - name: Test Go packages
        run: go test ./...

      - name: Run core gate
        run: go run ./cmd/kbcheck core
